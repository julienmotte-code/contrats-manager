# Alembic configuration for backend/
# DATABASE_URL est lue depuis l'environnement par alembic/env.py — ne PAS la mettre ici.
# Voir alembic/README.md pour les conventions et le workflow standard.

[alembic]
# path to migration scripts (relative to this file)
script_location = alembic

# prepend le répertoire de alembic.ini (= /app dans le conteneur) au sys.path,
# pour que `from app.models.models import Base` fonctionne depuis env.py.
prepend_sys_path = .

# template used to generate migration file names ; sans timestamp pour rester
# lisible et reproductible. format : <revision>_<slug>.py
file_template = %%(rev)s_%%(slug)s

# timezone des dates dans les migrations (UTC pour la portabilité GCP future)
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 60

# revision environment is loaded from alembic/env.py
# sqlalchemy.url is intentionally left blank — set via DATABASE_URL env var
sqlalchemy.url =

# Output encoding for migration scripts
output_encoding = utf-8


[post_write_hooks]
# Aucun hook automatique pour le moment. Format manuel avec black/ruff possible à activer plus tard :
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --select I --fix REVISION_SCRIPT_FILENAME


# Logging configuration (sortie console minimaliste pour Docker)
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
